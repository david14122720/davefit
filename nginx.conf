server {
    listen 80;
    server_name _;

    # Compression for performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Important security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Static assets directly from the client folder (if needed)
    # But usually Astro Node handles this too. 
    # Let's keep /_astro/ optimized.
    location /_astro/ {
        proxy_pass http://127.0.0.1:1412;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # All other requests go to the Astro (Node) server
    location / {
        proxy_pass http://127.0.0.1:1412;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for longer requests (like uploads)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check for Dokploy
    location /health {
        access_log off;
        return 200 "healthy\n";
    }
}
